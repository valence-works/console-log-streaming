name: Build and publish NuGet packages

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release
  PACKAGE_OUTPUT: artifacts/packages
  VERSION_PROJECT: src/ConsoleLogStream.Core/ConsoleLogStream.Core.csproj
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pack-and-publish:
    name: Pack and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package-version: ${{ steps.version.outputs.package-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Compute package version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          base_version="$(dotnet msbuild "$VERSION_PROJECT" -getProperty:VersionPrefix | tail -n 1 | tr -d '\r')"
          if [ -z "$base_version" ]; then
            echo "::error::VersionPrefix could not be resolved from $VERSION_PROJECT"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "release" ]; then
            release_tag="${{ github.event.release.tag_name }}"
            normalized_tag="${release_tag#v}"

            if [ "$normalized_tag" != "$base_version" ]; then
              echo "::error::Release tag '$release_tag' does not match VersionPrefix '$base_version'. Use tag v$base_version or update Directory.Build.props."
              exit 1
            fi

            package_version="$base_version"
            package_channel="stable"
          else
            package_version="${base_version}-preview.${GITHUB_RUN_NUMBER}"
            package_channel="preview"
          fi

          echo "base-version=$base_version" >> "$GITHUB_OUTPUT"
          echo "package-version=$package_version" >> "$GITHUB_OUTPUT"
          echo "Package version: $package_version ($package_channel)"

      - name: Restore
        run: dotnet restore ConsoleLogStream.slnx

      - name: Build
        run: >
          dotnet build ConsoleLogStream.slnx
          --configuration "$CONFIGURATION"
          --no-restore
          -p:Version="${{ steps.version.outputs.package-version }}"
          -p:PackageVersion="${{ steps.version.outputs.package-version }}"
          -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test ConsoleLogStream.slnx --configuration "$CONFIGURATION" --no-build --no-restore

      - name: Pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$PACKAGE_OUTPUT"

          for project in src/*/*.csproj; do
            dotnet pack "$project" \
              --configuration "$CONFIGURATION" \
              --no-build \
              --no-restore \
              --output "$PACKAGE_OUTPUT" \
              -p:Version="${{ steps.version.outputs.package-version }}" \
              -p:PackageVersion="${{ steps.version.outputs.package-version }}" \
              -p:ContinuousIntegrationBuild=true
          done

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: console-log-stream-${{ steps.version.outputs.package-version }}
          path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg
          if-no-files-found: error

      - name: Publish to NuGet.org
        if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "::warning::Repository secret NUGET_API_KEY is not configured; package publishing to NuGet.org was skipped."
            exit 0
          fi

          for package in "$PACKAGE_OUTPUT"/*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source "$NUGET_SOURCE" \
              --skip-duplicate
          done

      - name: Skip NuGet.org publish for non-main manual dispatch
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: echo "::warning::Manual workflow_dispatch runs only publish to NuGet.org from main; package artifacts were uploaded for this ref."

  attach-release-assets:
    name: Attach release assets
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: pack-and-publish
    permissions:
      contents: write

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: console-log-stream-${{ needs.pack-and-publish.outputs.package-version }}
          path: ${{ env.PACKAGE_OUTPUT }}

      - name: Attach packages to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ github.event.release.tag_name }}" "$PACKAGE_OUTPUT"/*.nupkg --clobber
